<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 96" width="320" height="96" role="img" aria-labelledby="t">
  <title id="t">Reeve — autonomous GitHub maintainer</title>
  <defs>
    <linearGradient id="shield" x1="6" y1="14" x2="86" y2="86" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34E0C8"/>
      <stop offset=".52" stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="rfill" x1="48" y1="26" x2="48" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D7E2EE"/>
    </linearGradient>
    <linearGradient id="word" x1="104" y1="34" x2="300" y2="66" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset=".55" stop-color="#22B8E6"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <clipPath id="clip">
      <path d="M26 20 H70 Q78 20 78 28 V50 Q78 70 48 82 Q18 70 18 50 V28 Q18 20 26 20 Z"/>
    </clipPath>
    <filter id="lift" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2.5" stdDeviation="3" flood-color="#070B18" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- emblem, scaled to ~74px and vertically centred -->
  <g transform="translate(6,11) scale(0.78)" filter="url(#lift)">
    <path d="M26 20 H70 Q78 20 78 28 V50 Q78 70 48 82 Q18 70 18 50 V28 Q18 20 26 20 Z" fill="url(#shield)"/>
    <g clip-path="url(#clip)">
      <ellipse cx="48" cy="8" rx="44" ry="22" fill="#FFFFFF" opacity="0.16"/>
    </g>
    <path d="M26 20 H70 Q78 20 78 28 V50 Q78 70 48 82 Q18 70 18 50 V28 Q18 20 26 20 Z"
      fill="none" stroke="#FFFFFF" stroke-opacity="0.22" stroke-width="1.5"/>
    <g fill="url(#rfill)">
      <rect x="34" y="30" width="11" height="38" rx="3"/>
      <path d="M45 27 A14.5 14.5 0 0 1 45 56 L45 48 A6.5 6.5 0 0 0 45 35 Z"/>
      <path d="M43 49 L53 49 L64 68 L54 68 Z"/>
    </g>
  </g>

  <!-- wordmark + tagline -->
  <text x="103" y="54"
    font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="42" font-weight="700" letter-spacing="-1.5" fill="url(#word)">Reeve</text>
  <text x="105" y="72"
    font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="10.5" font-weight="600" letter-spacing="3.6" fill="#2DD4BF" fill-opacity="0.92">GITHUB MAINTAINER</text>
</svg>
