<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 64" width="240" height="64" role="img" aria-labelledby="lk-title">
  <title id="lk-title">Reeve — autonomous GitHub maintainer</title>
  <!-- Horizontal lockup: the hexagonal-seal/key icon (accent teal) + the "Reeve" wordmark (deep slate). -->
  <defs>
    <mask id="reeve-key-lk">
      <rect width="64" height="64" fill="white"/>
      <circle cx="32" cy="21" r="7" fill="black"/>
      <circle cx="32" cy="21" r="3" fill="white"/>
      <rect x="29.5" y="21" width="5" height="22" rx="2.5" fill="black"/>
      <rect x="34.5" y="34" width="6" height="3" rx="1.5" fill="black"/>
      <rect x="34.5" y="39.5" width="4.5" height="3" rx="1.5" fill="black"/>
    </mask>
  </defs>
  <!-- icon, scaled to ~52px, vertically centred -->
  <g transform="translate(4,6) scale(0.8)">
    <polygon
      points="32,5 55.38,18.5 55.38,45.5 32,59 8.62,45.5 8.62,18.5"
      fill="#14B8A6"
      stroke="#14B8A6"
      stroke-width="4"
      stroke-linejoin="round"
      mask="url(#reeve-key-lk)"/>
  </g>
  <!-- wordmark -->
  <text x="62" y="41"
    font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="32" font-weight="700" letter-spacing="0.5" fill="#1E293B">Reeve</text>
  <text x="63" y="55"
    font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
    font-size="9.5" font-weight="500" letter-spacing="2.4" fill="#14B8A6">GITHUB MAINTAINER</text>
</svg>
